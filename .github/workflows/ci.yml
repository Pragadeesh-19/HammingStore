name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'
          cache: maven

      - name: Build
        run: mvn clean package -DskipTests -q

      - name: Test
        run: mvn test

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: hammingstore-jar
          path: target/hammingstore-core-*.jar
          retention-days: 7