# fly.toml app configuration file generated for hammingstore on 2026-03-13T18:45:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hammingstore'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  DIMS = '384'
  MAX_VECTORS = '200000'
  PORT = '50051'

[[mounts]]
  source = 'hammingstore_data'
  destination = '/data'
  initial_size = '1gb'

[[services]]
  protocol = 'tcp'
  internal_port = 50051

  [[services.ports]]
    port = 50051
    handlers = ['tls', 'http']
    tls_options = { alpn = ['h2'] }

  [services.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ['http']

  [[services.ports]]
    port = 8080
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    soft_limit = 100
    hard_limit = 200

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
