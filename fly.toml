app = "hammingstore"
primary_region = "lhr"

[build]
dockerfile = "Dockerfile"

[env]
PORT = "50051"
MAX_VECTORS = "200000"
DIMS = "384"
DATA_DIR = "/data"

[[services]]
protocol = "tcp"
internal_port = 50051

[[services.ports]]
port = 50051
handlers = ["tls"]
tls_options = { alpn = ["h2"] }

[services.concurrency]
type = "requests"
soft_limit = 50
hard_limit = 100

[mounts]
source = "hammingstore_data"
destination = "/data"
initial_size = "1gb"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1